<script>
  /* System default is handled by CSS @media (prefers-color-scheme: dark).
   This script only restores an explicit user override from localStorage
   and provides the toggle function used by the button.              */
  (function () {
    try {
      var stored = localStorage.getItem("bettongia-theme");
      if (stored === "dark" || stored === "light") {
        document.documentElement.setAttribute("data-theme", stored);
      }
    } catch (e) {}

    window.toggleBettongiaTheme = function () {
      var d = document.documentElement;
      var sysDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
      var current =
        d.getAttribute("data-theme") || (sysDark ? "dark" : "light");
      var next = current === "dark" ? "light" : "dark";
      d.setAttribute("data-theme", next);
      try {
        localStorage.setItem("bettongia-theme", next);
      } catch (e) {}
    };
  })();
</script>
