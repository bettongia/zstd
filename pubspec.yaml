name: betto_zstd
description: Zstd compression
version: 0.1.0-dev.1
repository: https://github.com/bettongia/zstd
issue_tracker: https://github.com/bettongia/zstd/issues

topics:
  - compression
  - zstd

flutter:
  assets:
    - lib/assets/zstd.wasm

environment:
  sdk: ^3.12.0

# Add regular dependencies here.
dependencies:
  code_assets: ^1.0.0
  hooks: ^1.0.3
  logging: ^1.3.0
  ffi: ^2.1.4
  native_toolchain_c: ^0.17.6
  collection: ^1.19.1

dev_dependencies:
  lints: ^6.1.0
  test: ^1.30.0
  ffigen: ^20.1.1

ffigen:
  name: Zstd
  description: zstd compression
  output: "lib/src/third_party/zstd.dart"

  headers:
    entry-points:
      - "third_party/zstd/zstd.h"

  functions:
    include:
      ["ZSTD_compress", "ZSTD_decompress", "ZSTD_minCLevel", "ZSTD_maxCLevel"]
