name: betto_zstd
description:
  A Zstandard (Zstd) compression library for Dart. Supports native platforms via
  FFI and the web platform via an Emscripten-compiled WASM module.
version: 0.1.0-dev.3
repository: https://github.com/bettongia/zstd
issue_tracker: https://github.com/bettongia/zstd/issues
homepage: https://bettongia.github.io/zstd/

topics:
  - compression
  - zstd

platforms:
  android:
  ios:
  linux:
  macos:
  windows:
  web:

flutter:
  assets:
    - lib/assets/zstd.wasm

environment:
  sdk: ^3.12.0

# Add regular dependencies here.
dependencies:
  code_assets: ^1.2.0
  hooks: ^2.0.0
  logging: ^1.3.0
  ffi: ^2.1.4
  native_toolchain_c: ^0.19.0
  collection: ^1.19.1

dev_dependencies:
  lints: ^6.1.0
  test: ^1.30.0
  ffigen: ^20.1.1

ffigen:
  name: Zstd
  description: zstd compression
  output: "lib/src/third_party/zstd.dart"
  preamble: |
    // ignore_for_file: type=lint, unused_import, unused_element, unused_field

  headers:
    entry-points:
      - "third_party/zstd/zstd.h"

  functions:
    include:
      ["ZSTD_compress", "ZSTD_decompress", "ZSTD_minCLevel", "ZSTD_maxCLevel"]
