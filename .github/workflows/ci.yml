name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------- Linux: analysis, formatting, native tests, coverage ----------
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Install addlicense
        run: |
          go install github.com/google/addlicense@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - run: make cicd

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info

  # ---------- macOS: native tests (arm64 + x86_64) ----------
  test-macos:
    runs-on: macos-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - run: make cicd_macos

  # ---------- Windows: native tests via MSVC ----------
  test-windows:
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - run: make cicd_windows

  # ---------- Web: WASM via Chrome ----------
  # Requires lib/assets/zstd.wasm to be committed.  Build it locally with
  # `make wasm` (needs Emscripten) and commit the result.
  test-web:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - uses: browser-actions/setup-chrome@v1

      - run: make web_test
        env:
          CHROME_EXECUTABLE: chrome
