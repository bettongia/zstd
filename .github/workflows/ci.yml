name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------- Linux: analysis, formatting, native tests, coverage ----------
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Install addlicense
        run: |
          go install github.com/google/addlicense@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - run: make cicd

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/lcov.info

  # ---------- macOS: native tests (arm64 + x86_64) ----------
  test-macos:
    runs-on: macos-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - run: make cicd_macos

  # ---------- Windows: native tests via MSVC ----------
  test-windows:
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - run: make cicd_windows

  # ---------- WASM freshness check ----------
  # Rebuilds lib/assets/zstd.wasm from source under the pinned Emscripten
  # version and asserts that the result is bit-for-bit identical to the
  # committed binary.  The pinned version is read from EMSCRIPTEN_VERSION.
  verify-wasm:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Read pinned Emscripten version
        id: read_version
        run: echo "version=$(cat EMSCRIPTEN_VERSION)" >> "$GITHUB_OUTPUT"

      - uses: mymindstorm/setup-emscripten@v1
        with:
          version: ${{ steps.read_version.outputs.version }}

      - run: make wasm

      - name: Assert WASM binary is unchanged
        run: git diff --exit-code lib/assets/zstd.wasm

  # ---------- Web: WASM via Chrome ----------
  # Requires lib/assets/zstd.wasm to be committed.  Build it locally with
  # `make wasm` (needs Emscripten) and commit the result.  The verify-wasm
  # job above proves the committed binary was built from the current source
  # before these tests run against it.
  test-web:
    runs-on: ubuntu-latest
    needs: [build, verify-wasm]
    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - uses: browser-actions/setup-chrome@v1

      - run: make web_test
        env:
          CHROME_EXECUTABLE: chrome
