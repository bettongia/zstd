name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------- Linux: analysis, formatting, native tests, coverage ----------
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Install Pandoc
        uses: pandoc/actions/setup@v1

      - name: Install addlicense
        run: |
          go install github.com/google/addlicense@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - run: make cicd

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "./site"

  deployment:
    runs-on: ubuntu-latest
    needs: build

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  # ---------- macOS: native tests (arm64 + x86_64) ----------
  test-macos:
    runs-on: macos-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - run: make cicd_macos

  # ---------- Windows: native tests via MSVC ----------
  test-windows:
    runs-on: windows-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - run: make cicd_windows

  # ---------- WASM freshness check ----------
  # Rebuilds lib/assets/zstd.wasm from source under the pinned Emscripten
  # version and asserts that the result is bit-for-bit identical to the
  # committed binary.  The pinned version is read from EMSCRIPTEN_VERSION.
  verify-wasm:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Read pinned Emscripten version
        id: emsdk_ver
        run: echo "version=$(cat EMSCRIPTEN_VERSION)" >> "$GITHUB_OUTPUT"

      - name: Cache Emscripten SDK
        id: cache_emsdk
        uses: actions/cache@v5
        with:
          path: /tmp/emsdk
          key: emsdk-${{ steps.emsdk_ver.outputs.version }}-${{ runner.os }}

      - name: Install Emscripten SDK
        if: steps.cache_emsdk.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/emscripten-core/emsdk.git /tmp/emsdk
          /tmp/emsdk/emsdk install "${{ steps.emsdk_ver.outputs.version }}"

      - name: Activate Emscripten
        run: |
          /tmp/emsdk/emsdk activate "${{ steps.emsdk_ver.outputs.version }}"
          echo "/tmp/emsdk/upstream/emscripten" >> "$GITHUB_PATH"

      - run: make wasm

      - name: Assert WASM binary is unchanged
        run: git diff --exit-code lib/assets/zstd.wasm

  # ---------- Web: WASM via Chrome ----------
  # Requires lib/assets/zstd.wasm to be committed.  Build it locally with
  # `make wasm` (needs Emscripten) and commit the result.  The verify-wasm
  # job above proves the committed binary was built from the current source
  # before these tests run against it.
  test-web:
    runs-on: ubuntu-latest
    needs: [build, verify-wasm]
    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - uses: browser-actions/setup-chrome@v2

      - run: make web_test
        env:
          CHROME_EXECUTABLE: chrome
